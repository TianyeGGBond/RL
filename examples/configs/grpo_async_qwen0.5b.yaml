# Async GRPO on Qwen2.5-0.5B-Instruct — minimal config for 2-GPU VastAI testing
# Target: 2x GPU (e.g. RTX 3060 12GB each), dp=2 vLLM + megatron training
#
# Key differences from grpo_math_1B.yaml:
#   - Qwen2.5-0.5B-Instruct (smallest Qwen2.5, ~1GB weights)
#   - async_grpo.enabled: true  (required for F5/F6 partial overlap testing)
#   - use_importance_sampling_correction: true  (required for async mode)
#   - vllm_cfg.async_engine: true  (required for async generation)
#   - colocated.enabled: false  (non-colocated, required for async GRPO)
#   - Reduced batch sizes / seq lengths for 12GB VRAM
#   - dp=2 vLLM (tensor_parallel_size: 1, 2 separate DP shards via cluster config)
#   - max_trajectory_age_steps: 2  (allow 2-step off-policy, enables partial overlap)

grpo:
  num_prompts_per_step: 8       # small: 8 prompts × 4 generations = 32 samples/step
  num_generations_per_prompt: 4
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 200            # short run for validation
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 20
  val_at_start: false
  val_at_end: true
  overlong_filtering: false
  max_val_samples: 32
  val_batch_size: 32
  seed: 42
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  reward_shaping:
    enabled: false
    overlong_buffer_length: 64
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null

  adv_estimator:
    name: "grpo"
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  seq_logprob_error_threshold: null

  async_grpo:
    enabled: true                        # F5: enable async GRPO mode
    max_trajectory_age_steps: 2          # allow 2-step off-policy for partial overlap
    in_flight_weight_updates: true        # enable in-flight updates (required for age > 1)
    recompute_kv_cache_after_weight_updates: false

loss_fn:
  reference_policy_kl_penalty: 0.01
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: true  # required for async GRPO
  truncated_importance_sampling_ratio: null
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: false
  use_kl_in_reward: false

checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo_qwen0.5b_async"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 2
  save_period: 50
  checkpoint_must_save_by: null
  model_save_format: "safetensors"
  save_consolidated: false
  save_optimizer: true

policy:
  model_name: "Qwen/Qwen2.5-0.5B-Instruct"   # 0.5B — fits on single 12GB GPU
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 32     # 8 prompts × 4 generations
  train_micro_batch_size: 4
  generation_batch_size: 32
  logprob_batch_size: ${policy.train_micro_batch_size}
  max_total_sequence_length: 256  # short for small VM
  precision: "bfloat16"
  logprob_chunk_size: null
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: true
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    automodel_kwargs: {}
    lora_cfg:
      enabled: false
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  megatron_cfg:
    enabled: false                 # use DTensor backend for 0.5B on small VM

  draft:
    enabled: false
    model_name: null
    loss_weight: 0.1
    num_layers: null
    aux_layer_indices: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}
  max_grad_norm: 1.0

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 5.0e-6
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1e-8
      foreach: false
      fused: false

  scheduler:
    - name: "torch.optim.lr_scheduler.LinearLR"
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 20
    - name: "torch.optim.lr_scheduler.ConstantLR"
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: [20]

  generation:
    backend: "vllm"
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true            # F5: required for async GRPO + partial overlap
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 1       # TP=1 per shard; dp=2 via 2 separate vLLM workers
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.5   # conservative: leave headroom for training on overlap GPU
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: true           # safer on small VMs, avoids CUDA graph OOM
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
    vllm_kwargs: {}
    colocated:
      enabled: false                # F5: non-colocated required for async GRPO partial overlap

data:
  max_input_seq_length: ${policy.max_total_sequence_length}
  shuffle: true
  num_workers: 1
  use_multiple_dataloader: false
  train:
    dataset_name: OpenMathInstruct-2
    split_validation_size: 0.05
    seed: ${grpo.seed}
  validation: null
  default:
    prompt_file: "examples/prompts/cot.txt"
    system_prompt_file: null
    processor: "math_hf_data_processor"
    env_name: "math"

env:
  math:
    num_workers: 4
    math_verify_impl: "hf_math_verify"

logger:
  log_dir: "logs"
  num_val_samples_to_print: 2
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "grpo-qwen0.5b-f5f6"
    name: "async-grpo-0.5b"
  tensorboard: {}
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 2   # 2x GPU VastAI node
  num_nodes: 1
